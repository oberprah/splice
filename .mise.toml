# mise configuration for Splice
# Manages language toolchains and development tools

[settings]
http_timeout = "300"

[tools]
rust = "1.93.1"

[tasks.install-local]
description = "Build release binary and install ./splice safely"
run = [
  "cargo build --release --bin splice-rust",
  "rm -f ./splice.new",
  "cp target/release/splice-rust ./splice.new",
  "chmod +x ./splice.new",
  "mv -f ./splice.new ./splice",
  "ls -l ./splice",
]
