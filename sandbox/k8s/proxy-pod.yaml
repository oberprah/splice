apiVersion: v1
kind: Pod
metadata:
  name: api-proxy
  namespace: agent-env
  labels:
    app: api-proxy
spec:
  automountServiceAccountToken: false
  containers:
    - name: envoy
      image: api-proxy:local
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # envoy user
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      ports:
        - containerPort: 8080
          name: anthropic
        - containerPort: 8081
          name: openai
      envFrom:
        - secretRef:
            name: api-credentials
      resources:
        limits:
          memory: "256Mi"
          cpu: "250m"
