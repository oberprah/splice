apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-isolation
  namespace: agent-env
spec:
  podSelector:
    matchLabels:
      app: claude-agent
  policyTypes:
    - Egress
  egress:
    # Allow traffic to the API proxy (Anthropic on 8080, OpenAI on 8081)
    - to:
        - podSelector:
            matchLabels:
              app: api-proxy
      ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
