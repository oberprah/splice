services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    pull_policy: missing
    command: --config /root/.litellm-config.yaml --port 4000
    volumes:
      - ~/.litellm-config.yaml:/root/.litellm-config.yaml:ro
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 3s

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace  # Mount the repo
    environment:
      - ANTHROPIC_BASE_URL=http://litellm:4000
      - ANTHROPIC_AUTH_TOKEN=not-needed  # LiteLLM handles auth
      - ANTHROPIC_MODEL=claude-sonnet-4-5-20250929
    networks:
      - sandbox-net
    depends_on:
      litellm:
        condition: service_healthy
    stdin_open: true
    tty: true

networks:
  sandbox-net:
    driver: bridge
