services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    pull_policy: missing
    command: --config /root/.litellm-config.yaml --port 4000
    volumes:
      - ~/.litellm-config.yaml:/root/.litellm-config.yaml:ro
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 3s
      timeout: 4s
      retries: 5
      start_period: 2s

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    security_opt:
      - no-new-privileges:true
    volumes:
      - ..:/workspace:rw                        # Repo read/write
      - ../.git:/workspace/.git:ro              # Protect git history and hooks
      - ../.github:/workspace/.github:ro        # Protect CI/CD workflows
      - ../sandbox:/workspace/sandbox:ro        # Protect container config
    environment:
      - ANTHROPIC_BASE_URL=http://litellm:4000
      - ANTHROPIC_AUTH_TOKEN=not-needed  # LiteLLM handles auth
      - ANTHROPIC_MODEL=claude-sonnet-4-5-20250929
    networks:
      - sandbox-net
    depends_on:
      litellm:
        condition: service_healthy
    stdin_open: true
    tty: true

networks:
  sandbox-net:
    driver: bridge
